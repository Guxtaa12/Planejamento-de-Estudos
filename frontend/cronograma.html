<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronograma - Nidus</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <header>
            <a href="home.html" class="btn-voltar">&larr; Voltar para Home</a>
            
            <h1>Minhas Tarefas</h1>
        </header>

        <main>
            <!-- CALENDÁRIO VISUAL -->
            <section class="card" id="calendario-mensal" style="margin-bottom: 25px;">
                <div class="calendar-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <button class="btn-cal" id="prev-month" style="background:var(--cor-primaria); color:#fff; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;">&lt; Anterior</button>
                    <h2 id="mes-ano-display" style="margin:0;">Mês Ano</h2>
                    <button class="btn-cal" id="next-month" style="background:var(--cor-primaria); color:#fff; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;">Próximo &gt;</button>
                </div>
                
                <div class="calendar-grid" id="calendar-grid">
                    <!-- Nomes dos dias injetados via JS para manter o grid limpo -->
                </div>
            </section>

            <!-- LISTA TRADICIONAL (MANTIDA PARA CONCLUIR TAREFAS COM CHECKBOX) -->
            <section class="card" id="cronograma">
                <h2><i class="fa-regular fa-clipboard"></i> Todas as Tarefas</h2>
                <ul id="lista-tarefas">
                    <p id="sem-tarefas-mensagem" style="display: none; text-align: center; color: #888;">Nenhuma tarefa cadastrada ainda.</p>
                </ul>
            </section>
        </main>

        <footer>
            <div style="margin-bottom: 20px;"><button id="btn-logout" class="btn-logout footer-logout">Sair da Conta <i class="fas fa-sign-out-alt"></i></button></div>
            <p>&copy; 2025 Nidus</p>
        </footer>
    </div>

    <script src="js/script.js"></script>
<button id="btn-theme" class="btn-theme" title="Alternar Tema"><i class="fas fa-moon"></i></button>
</body>
</html>
