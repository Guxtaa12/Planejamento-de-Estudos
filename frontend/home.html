<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Nidus</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Nidus</h1>
            
            <p>Organize suas tarefas e anotações.</p>
        </header>

        <main class="home-layout">
            <div class="home-col">
                <!-- 1. Perfil e Nível (Gamificação) -->
                <section class="card profile-card" id="profile-card">
                    <a href="perfil.html" style="text-decoration: none; color: inherit; display: block;" title="Editar Perfil">
                        <div class="profile-header" style="transition: transform 0.2s;">
                            <div class="avatar-circle"><i class="fas fa-user-graduate"></i></div>
                            <div class="profile-info">
                                <h2 id="user-display-name">Carregando...</h2>
                                <p id="user-level-title" class="level-title">Nível 1 - Aprendiz</p>
                            </div>
                        </div>
                    </a>
                    <div class="xp-container">
                        <div class="xp-labels">
                            <span id="xp-current">0 XP</span>
                            <span id="xp-next">100 XP</span>
                        </div>
                        <div class="xp-bar-bg">
                            <div class="xp-bar-fill" id="xp-bar-fill" style="width: 0%;"></div>
                        </div>
                    </div>
                </section>

                <!-- 2. Menu de Acesso Rápido -->
                <section class="card home-menu">
                    <h2>Acesso Rápido</h2>
                    <nav>
                        <a href="adicionar-tarefa.html" class="menu-button">
                            <i class="fas fa-plus"></i> Adicionar Nova Tarefa
                        </a>
                        <a href="cronograma.html" class="menu-button">
                            <i class="fa-regular fa-clipboard"></i> Ver Cronograma/Tarefas
                        </a>
                        <a href="anotacoes.html" class="menu-button">
                            <i class="fa-solid fa-pen"></i> Anotações Rápidas
                        </a>
                        <a href="cadernos.html" class="menu-button" style="background: var(--cor-secundaria); color: #fff;">
                            <i class="fa-solid fa-book-open"></i> Meus Cadernos (Notion-like)
                        </a>
                    </nav>
                </section>
            </div>
            
            <div class="home-col">
                <!-- 3. Timer Pomodoro -->
                <aside class="card pomodoro-card">
                    <h2><i class="fas fa-stopwatch"></i> Pomodoro</h2>
                    <div class="pomodoro-tabs">
                        <button class="pomodoro-tab active" data-time="25">Foco</button>
                        <button class="pomodoro-tab" data-time="5">Pausa Curta</button>
                        <button class="pomodoro-tab" data-time="15">Pausa Longa</button>
                    </div>
                    <div class="pomodoro-timer" id="pomodoro-timer">25:00</div>
                    <div class="pomodoro-controls">
                        <button class="btn-pomo" id="btn-pomo-start">Iniciar</button>
                        <button class="btn-pomo secondary" id="btn-pomo-reset">Resetar</button>
                    </div>
                </aside>

                <!-- 4. Lofi Player (Som Ambiente) -->
                <aside class="card lofi-card">
                    <h2><i class="fas fa-headphones"></i> Som de Foco (Lo-Fi)</h2>
                    <div class="lofi-player">
                        <iframe width="100%" height="150" style="border-radius:12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);" src="https://www.youtube.com/embed/jfKfPfyJRdk" title="Lofi Girl Radio" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                    </div>
                </aside>
            </div>
        </main>

        <footer>
            <div style="margin-bottom: 20px;"><button id="btn-logout" class="btn-logout footer-logout">Sair da Conta <i class="fas fa-sign-out-alt"></i></button></div>
            <p>&copy; 2025 Nidus</p>
        </footer>
    </div>
    <script src="js/script.js"></script>
    <button id="btn-theme" class="btn-theme" title="Alternar Tema"><i class="fas fa-moon"></i></button>
</body>
</html>
