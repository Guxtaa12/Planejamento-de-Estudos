<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nidus - Bem-vindo!</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Nidus</h1>
            <div id="user-info-header" style="display: none;">
                <span id="welcome-message"></span>
                <button id="btn-logout" class="btn-logout">Sair</button>
            </div>
        </header>

        <main>
            <div id="logged-out-view">
                <section class="card site-description">
                    <h2>Bem-vindo(a) à sua Nidus!</h2>
                    <p>
                        Simplifique sua rotina acadêmica. Aqui você pode organizar suas tarefas,
                        nunca mais perder um prazo com nosso cronograma e manter suas ideias
                        organizadas com anotações rápidas. Faça seu cadastro ou login para começar!
                    </p>
                <nav class="auth-nav">
                    <a href="login.html" class="menu-button auth-button">
                        <i class="fa-solid fa-key"></i> Login
                    </a>
                    <a href="registrar.html" class="menu-button auth-button">
                        <i class="fa-solid fa-user"></i> Registrar
                    </a>
                </nav>
            </div>
        </main>

        <footer>
            <div style="margin-bottom: 20px;"><button id="btn-logout" class="btn-logout footer-logout">Sair da Conta <i class="fas fa-sign-out-alt"></i></button></div>
            <p>&copy; 2025 Nidus</p>
        </footer>
    </div>

    <script src="js/script.js"></script>
<button id="btn-theme" class="btn-theme" title="Alternar Tema"><i class="fas fa-moon"></i></button>
</body>
</html>
