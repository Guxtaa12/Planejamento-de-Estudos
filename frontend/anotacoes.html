<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anotações - Plataforma de Estudos</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <header>
            <a href="home.html" class="btn-voltar">&larr; Voltar para Home</a>
            <button id="btn-logout" class="btn-logout">Sair <i class="fas fa-sign-out-alt"></i></button>
            <h1>Anotações Rápidas</h1>
        </header>

        <main>
            <section class="card" id="nova-anotacao">
                <h2><i class="fa-solid fa-notes-medical"></i>Nova Anotação Rápida</h2>
                <form id="form-anotacao">
                    <textarea id="texto-anotacao" placeholder="Digite sua nova anotação aqui..." required style="width: 100%; min-height: 80px; margin-bottom: 10px;"></textarea>
                    
                    <div class="color-palette">
                        <label>Cor do Post-it?:</label>
                        <input type="radio" name="postit-color" value="#ffeb3b" id="cor-amarelo" checked>
                        <label for="cor-amarelo" class="color-btn" style="background-color: #ffeb3b;"></label>
                        
                        <input type="radio" name="postit-color" value="#ffc0cb" id="cor-rosa">
                        <label for="cor-rosa" class="color-btn" style="background-color: #ffc0cb;"></label>
                        
                        <input type="radio" name="postit-color" value="#a2d5f2" id="cor-azul">
                        <label for="cor-azul" class="color-btn" style="background-color: #a2d5f2;"></label>
                        
                        <input type="radio" name="postit-color" value="#c8e6c9" id="cor-verde">
                        <label for="cor-verde" class="color-btn" style="background-color: #c8e6c9;"></label>
                    </div>

                    <button type="submit" class="btn-add">Criar Post-it</button>
                </form>
                <p id="anotacao-add-message" class="mensagem sucesso"></p>
            </section>
        
            <section class="card" id="painel-anotacoes-salvas">
                <h2><i class="fa-solid fa-note-sticky"></i>Meu Mural de Post-its</h2>
                
            </section>
        </main>

        <footer>
            <p>&copy; 2025 Plataforma de Estudos</p>
        </footer>
    </div>

    <div id="quadro-anotacoes"></div>

    <script src="js/script.js"></script>
<button id="btn-theme" class="btn-theme" title="Alternar Tema"><i class="fas fa-moon"></i></button>
</body>
</html>
